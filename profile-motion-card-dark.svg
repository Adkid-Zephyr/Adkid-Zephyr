<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="430" viewBox="0 0 1200 430" role="img" aria-labelledby="title desc">
  <title id="title">Adkid Zephyr profile motion card</title>
  <desc id="desc">Daily-updated AI PM and fintech profile card with a spacious Gemini-inspired layout and normalized activity curve.</desc>
  <defs>
    <linearGradient id="card-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#08111f"/>
      <stop offset="0.55" stop-color="#13203a"/>
      <stop offset="1" stop-color="#08111f"/>
    </linearGradient>
    <linearGradient id="area" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a78bfa" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="line-gradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#a78bfa"/>
      <stop offset="0.54" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="blur-orb" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="28"/>
    </filter>
    <style><![CDATA[
      .outline {
        stroke: #203049;
        stroke-width: 1;
        fill: none;
        vector-effect: non-scaling-stroke;
      }
      .trace {
        stroke: url(#line-gradient);
        stroke-width: 3;
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .float {
        animation: float 8s ease-in-out infinite;
      }
      .pulse {
        animation: pulse 3.8s ease-in-out infinite;
      }
      .glow {
        animation: glow 7.2s ease-in-out infinite;
      }
      @keyframes float {
        0%, 100% { transform: translateY(0); opacity: 0.14; }
        50% { transform: translateY(-12px); opacity: 0.28; }
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.45; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.18); }
      }
      @keyframes glow {
        0%, 100% { opacity: 0.18; transform: translateX(0); }
        50% { opacity: 0.32; transform: translateX(18px); }
      }
    ]]></style>
  </defs>

  <rect x="10" y="10" width="1180" height="410" rx="30" fill="url(#card-bg)"/>
  <rect x="10" y="10" width="1180" height="410" rx="30" class="outline"/>
  <circle cx="928" cy="154" r="116" fill="#6d28d9" opacity="0.2" filter="url(#blur-orb)" class="float"/>
  <circle cx="1004" cy="240" r="76" fill="#0284c7" opacity="0.13" filter="url(#blur-orb)" class="glow"/>
  <rect x="52" y="54" width="420" height="300" rx="28" fill="#0f1728" opacity="0.86" stroke="#203049" stroke-width="1"/>
  <rect x="650" y="54" width="500" height="300" rx="28" fill="#0f1728" opacity="0.72" stroke="#203049" stroke-width="1"/>

