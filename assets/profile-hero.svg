<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Adkid Zephyr AI PM and Fintech profile hero</title>
  <desc id="desc">Minimal animated profile hero in a luxury editorial style, focused on AI product management and fintech systems.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f6f1e8"/>
      <stop offset="1" stop-color="#efe8dc"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbf8f1"/>
      <stop offset="1" stop-color="#f2ece2"/>
    </linearGradient>
    <style><![CDATA[
      .hairline {
        stroke: #111111;
        stroke-width: 1.2;
        fill: none;
        vector-effect: non-scaling-stroke;
      }
      .soft-line {
        stroke: #8b7d69;
        stroke-width: 1.2;
        fill: none;
        stroke-dasharray: 7 12;
        animation: drift 9s linear infinite;
      }
      .pulse-dot {
        animation: pulse 3.2s ease-in-out infinite;
      }
      .glide {
        animation: glide 7s ease-in-out infinite;
      }
      .ticker {
        animation: ticker 6.8s ease-in-out infinite;
      }
      @keyframes drift {
        to { stroke-dashoffset: -190; }
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.35; transform: scale(1); }
        50% { opacity: 0.95; transform: scale(1.18); }
      }
      @keyframes glide {
        0%, 100% { transform: translateX(0); opacity: 0.12; }
        50% { transform: translateX(36px); opacity: 0.28; }
      }
      @keyframes ticker {
        0%, 100% { transform: translateX(0); }
        50% { transform: translateX(18px); }
      }
    ]]></style>
  </defs>

  <rect x="10" y="10" width="1180" height="340" rx="28" fill="url(#bg)"/>
  <rect x="10" y="10" width="1180" height="340" rx="28" class="hairline"/>
  <rect x="36" y="36" width="1128" height="288" rx="22" fill="url(#panel)" stroke="#cabda7" stroke-width="1.1"/>

  <line x1="84" y1="96" x2="530" y2="96" class="hairline" opacity="0.7"/>
  <line x1="84" y1="272" x2="420" y2="272" class="hairline" opacity="0.42"/>
  <line x1="676" y1="70" x2="1082" y2="70" class="hairline" opacity="0.52"/>
  <path d="M700 194 C786 166 842 208 904 174 S1020 132 1084 158" class="soft-line"/>
  <rect x="840" y="92" width="188" height="190" rx="94" fill="#111111" opacity="0.04" class="glide"/>

  <g transform="translate(84 88)">
    <text x="0" y="0" fill="#171717" font-family="Helvetica Neue, Arial, sans-serif" font-size="16" letter-spacing="6">ADKID ZEPHYR</text>
    <text x="0" y="90" fill="#111111" font-family="Georgia, Times New Roman, serif" font-size="74">AI PM / Fintech</text>
    <text x="3" y="132" fill="#544d43" font-family="Helvetica Neue, Arial, sans-serif" font-size="22">Product systems for decision quality, risk-aware execution, and clear interfaces.</text>
  </g>

  <g transform="translate(86 286)">
    <rect x="0" y="-24" width="132" height="34" rx="17" fill="#111111"/>
    <text x="26" y="-2" fill="#f7f3ec" font-family="Helvetica Neue, Arial, sans-serif" font-size="14" letter-spacing="2">AI PM</text>
    <rect x="146" y="-24" width="136" height="34" rx="17" fill="none" stroke="#111111" stroke-width="1.1"/>
    <text x="176" y="-2" fill="#111111" font-family="Helvetica Neue, Arial, sans-serif" font-size="14" letter-spacing="2">FINTECH</text>
    <rect x="310" y="-24" width="196" height="34" rx="17" fill="none" stroke="#8b7d69" stroke-width="1.1"/>
    <text x="338" y="-2" fill="#5f5649" font-family="Helvetica Neue, Arial, sans-serif" font-size="14" letter-spacing="1.6">PRODUCT SYSTEMS</text>
  </g>

  <g transform="translate(706 104)">
    <text x="0" y="0" fill="#111111" font-family="Helvetica Neue, Arial, sans-serif" font-size="14" letter-spacing="4">PROFILE CANVAS</text>
    <text x="0" y="64" fill="#111111" font-family="Georgia, Times New Roman, serif" font-size="44">Measured motion.</text>
    <text x="0" y="102" fill="#5a5247" font-family="Helvetica Neue, Arial, sans-serif" font-size="18">Strategy, product judgement, and interface clarity over noise.</text>
    <line x1="0" y1="132" x2="320" y2="132" class="hairline" opacity="0.55"/>
    <g transform="translate(0 164)">
      <text x="0" y="0" fill="#111111" font-family="Helvetica Neue, Arial, sans-serif" font-size="16" letter-spacing="2">01</text>
      <text x="38" y="0" fill="#5f5649" font-family="Helvetica Neue, Arial, sans-serif" font-size="16">AI product strategy</text>
      <text x="0" y="34" fill="#111111" font-family="Helvetica Neue, Arial, sans-serif" font-size="16" letter-spacing="2">02</text>
      <text x="38" y="34" fill="#5f5649" font-family="Helvetica Neue, Arial, sans-serif" font-size="16">Fintech workflow design</text>
      <text x="0" y="68" fill="#111111" font-family="Helvetica Neue, Arial, sans-serif" font-size="16" letter-spacing="2">03</text>
      <text x="38" y="68" fill="#5f5649" font-family="Helvetica Neue, Arial, sans-serif" font-size="16">Operator-first interfaces</text>
    </g>
  </g>

  <g transform="translate(1046 76)">
    <circle cx="0" cy="0" r="6" fill="#111111" class="pulse-dot"/>
    <line x1="-156" y1="0" x2="-18" y2="0" class="hairline" opacity="0.45"/>
  </g>

  <g transform="translate(870 300)" class="ticker">
    <line x1="0" y1="0" x2="174" y2="0" class="hairline" opacity="0.5"/>
    <circle cx="174" cy="0" r="4" fill="#8b7d69"/>
  </g>
</svg>
